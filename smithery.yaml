name: sql-builder-ai-mcp
description: MEOK AI Labs MCP Server
version: 1.0.0
tools:
- name: build_select
  description: Build a SELECT SQL query from structured parameters.
  parameters:
  - name: table
    type: string
    required: true
  - name: columns
    type: array
    required: false
  - name: where
    type: object
    required: false
  - name: order_by
    type: string
    required: false
  - name: limit
    type: integer
    required: false
  - name: joins
    type: array
    required: false
- name: build_insert
  description: Build an INSERT SQL query from a list of row dicts.
  parameters:
  - name: table
    type: string
    required: true
  - name: rows
    type: array
    required: true
  - name: on_conflict
    type: string
    required: false
- name: explain_query
  description: Analyze and explain a SQL query's structure and components.
  parameters:
  - name: sql
    type: string
    required: true
- name: optimize_query_hints
  description: Suggest optimizations for a SQL query.
  parameters:
  - name: sql
    type: string
    required: true
